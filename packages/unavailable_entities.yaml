# ==================================================================================
# Package: Unavailable Entities Monitor
# Version: 2026.06.5
# Description:
#   Monitors devices and sensors for 'unavailable' or 'none' states.
#   Routes all alerts through the centralized global notification engine.
#
# --- Required Helpers & Dependencies ---
# To customize this package, create the following helpers:
#
# 1. input_number.delay_notify_unavailable
#    - Name: "𐃏 Delay Notifiy Unavailable"
#    - Purpose: Delay (in minutes) before notification triggers.
#
# 2. script.global_notify
#    - Purpose: Centralized notification engine (Defined in Server Monitor package).
#
# --- Configuration ---
# - Entity Exclusion: Assign the label "ignore" to any entity you wish to exclude
#   from monitoring.
# ==================================================================================

script:
  # Script to update this package from GitHub
  update_packages:
    sequence:
      - action: downloader.download_file
        data:
          overwrite: true
          url: >-
            {% set url = 'https://raw.githubusercontent.com/' %}
            {% if states.input_text.packages_account.state is defined %}
              {% set account = states('input_text.packages_account') %}
            {% else %}
              {% set account = 'topaniot' %}
            {% endif %}
            {% set path = '/HomeAssistant_Packages/main/packages/' %}
            {% set name = 'unavailable_entities.yaml' %}
            {{ url + account + path + name }}

template:
  - trigger:
      - trigger: time_pattern
        seconds: "/1"
    sensor:
      - name: "𐃏 Unavailable Entities"
        icon: "hass:shape"
        state: >
              {% set ignored = label_entities('ignore') %}
                    
              {{ states
                |selectattr('domain','in',['switch','light','cover','climate','camera','lock','remote'])
                |selectattr('state','in',['unavailable','none'])
                |rejectattr('entity_id','in', ignored )
                |list|count
              }}
        attributes:
            names: >
              {% set ignored = label_entities('ignore') %}
              {% set ns = namespace(results=[]) %}
              {% for entity in states
                |selectattr('domain','in',['switch','light','cover','climate','camera','lock','remote'])
                |selectattr('state','in',['unavailable','none'])
                |rejectattr('entity_id','in', ignored )
              %}
                {% set dev_name = device_attr(entity.entity_id, 'name') %}
                {% set is_generic = dev_name and ('shelly' in dev_name|lower or 'bthome' in dev_name|lower or 'daikin' in dev_name|lower or 'system monitor' in dev_name|lower) %}
                {# Combine device and entity name raw strings #}
                {% if dev_name and not is_generic %}
                  {% set raw_combined = dev_name ~ ' ' ~ entity.name %}
                {% else %}
                  {% set raw_combined = entity.name %}
                {% endif %}
                {# Tokenize and deduplicate words across the combined name #}
                {% set words = raw_combined.split(' ') %}
                {% set w_ns = namespace(seen=[], unique=[]) %}
                {% for w in words %}
                  {% set norm = w | lower | replace(':','') | replace('-','') | replace(',','') | replace('(','') | replace(')','') | trim %}
                  {% if norm != '' and norm not in w_ns.seen %}
                    {% set w_ns.seen = w_ns.seen + [norm] %}
                    {% set w_ns.unique = w_ns.unique + [w] %}
                  {% endif %}
                {% endfor %}
                {% set ns.results = ns.results + [w_ns.unique | join(' ')] %}
              {% endfor %}
              {{ ns.results | join(", ") }}

  - trigger:
      - trigger: time_pattern
        seconds: "/1"
    sensor:
      - name: "𐃏 Unavailable Sensors"
        icon: "hass:shape"
        state: >
              {% set ignored = label_entities('ignore') %}
                    
              {{ states
                |selectattr('domain','in',['sensor','binary_sensor'])
                |selectattr('attributes.device_class','defined')
                |selectattr('attributes.device_class','in',['temperature','energy','window','door','opening'])
                |selectattr('state', 'in', ['unavailable','none'])
                |rejectattr('entity_id','in', ignored )
                |list|count
              }}
        attributes:
            names: >
              {% set ignored = label_entities('ignore') %}
              {% set ns = namespace(results=[]) %}
              {% for entity in states
                |selectattr('domain','in',['sensor','binary_sensor'])
                |selectattr('attributes.device_class','defined')
                |selectattr('attributes.device_class','in',['temperature','energy','window','door','opening'])
                |selectattr('state', 'in', ['unavailable','none'])
                |rejectattr('entity_id','in', ignored ) 
              %}
                {% set dev_name = device_attr(entity.entity_id, 'name') %}
                {% set is_generic = dev_name and ('shelly' in dev_name|lower or 'bthome' in dev_name|lower or 'daikin' in dev_name|lower or 'system monitor' in dev_name|lower) %}
                {# Combine device and entity name raw strings #}
                {% if dev_name and not is_generic %}
                  {% set raw_combined = dev_name ~ ' ' ~ entity.name %}
                {% else %}
                  {% set raw_combined = entity.name %}
                {% endif %}
                {# Tokenize and deduplicate words across the combined name #}
                {% set words = raw_combined.split(' ') %}
                {% set w_ns = namespace(seen=[], unique=[]) %}
                {% for w in words %}
                  {% set norm = w | lower | replace(':','') | replace('-','') | replace(',','') | replace('(','') | replace(')','') | trim %}
                  {% if norm != '' and norm not in w_ns.seen %}
                    {% set w_ns.seen = w_ns.seen + [norm] %}
                    {% set w_ns.unique = w_ns.unique + [w] %}
                  {% endif %}
                {% endfor %}
                {% set ns.results = ns.results + [w_ns.unique | join(' ')] %}
              {% endfor %}
              {{ ns.results | join(", ") }}

  - trigger:
      - trigger: time_pattern
        seconds: "/1"
    sensor:
      - name: "𐃏 Low Signal"
        icon: "hass:wifi-strength-alert-outline"
        state: >
          {% set ignored = label_entities('ignore') %}
          {% set threshold = states('input_number.signal_rssi_threshold') | int(-80) 
            if states('input_number.signal_rssi_threshold') is defined else -80
          %}
          {{ states.sensor
            |selectattr('attributes.device_class','defined')
            |selectattr('attributes.device_class','==','signal_strength')
            |rejectattr('entity_id','in', ignored )
            |map(attribute='state') | map('int', 0)
            |select('le', threshold)
            |list | count
          }}
        attributes:
          names: >
            {% set ignored = label_entities('ignore') %}
            {% set threshold = states('input_number.signal_rssi_threshold') | int(-80) %}
            {% set ns = namespace(results=[]) %}
            
            {% for entity in states.sensor
              |selectattr('attributes.device_class','defined')
              |selectattr('attributes.device_class','==','signal_strength')
              |rejectattr('entity_id','in', ignored )
            %}
              {% if entity.state | int(-100) <= threshold %}
                {% set dev_name = device_attr(entity.entity_id, 'name') %}
                {% set is_generic = dev_name and ('shelly' in dev_name|lower or 'bthome' in dev_name|lower or 'daikin' in dev_name|lower or 'system monitor' in dev_name|lower) %}
                
                {% if dev_name and not is_generic %}
                  {% set raw_combined = dev_name ~ ' ' ~ entity.name %}
                {% else %}
                  {% set raw_combined = entity.name %}
                {% endif %}
                
                {% set words = raw_combined.split(' ') %}
                {% set w_ns = namespace(seen=[], unique=[]) %}
                {% for w in words %}
                  {% set norm = w | lower | replace(':','') | replace('-','') | replace(',','') | replace('(','') | replace(')','') | trim %}
                  {% if norm != '' and norm not in w_ns.seen and norm not in ['rssi', 'signal', 'strength', 'semnal', 'wi-fi', 'wifi'] %}
                    {% set w_ns.seen = w_ns.seen + [norm] %}
                    {% set w_ns.unique = w_ns.unique + [w] %}
                  {% endif %}
                {% endfor %}
                
                {% set display_name = w_ns.unique | join(' ') | trim %}
                {% if display_name == '' %}
                  {% set display_name = entity.name %}
                {% endif %}
                
                {% set ns.results = ns.results + [display_name ~ ' (' ~ entity.state ~ ' dBm)'] %}
              {% endif %}
            {% endfor %}
            {{ ns.results | join(", ") }}

input_number:
  unavailable_entities_last_triggered:
    name: "𐃏 Unavailable Entities Last Triggered"
    icon: "hass:alert-circle"
    mode: box
    min: 0
    max: 99999
    step: 1
  unavailable_sensors_last_triggered:
    name: "𐃏 Unavailable Sensors Last Triggered"
    icon: "hass:alert-circle"
    mode: box
    min: 0
    max: 99999
    step: 1

automation:
  - id: "unavailable_entities"
    alias: "𐃏 Unavailable Entities"
    mode: restart
    triggers:
      - trigger: state
        entity_id: sensor.unavailable_entities
      - trigger: homeassistant
        event: start
      - trigger: state
        entity_id:
          - input_boolean.maintenance_mode
        to: "off"
    condition:
      - condition: state
        entity_id: input_boolean.maintenance_mode
        state: "off"
      - condition: template
        value_template: "{{ states.sensor.unavailable_entities.state is defined }}"
    actions:
      - variables:
          count: "{{ states('sensor.unavailable_entities') | int(0) }}"
          last_triggered: "{{ states('input_number.unavailable_entities_last_triggered') | int(0) }}"
      - condition: template
        value_template: "{{ count != last_triggered }}"
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ count > 0 }}"
            sequence:
              - delay: 
                  minutes: >-
                    {% if states.input_number.delay_notify_unavailable.state is defined %}
                      {{ states('input_number.delay_notify_unavailable') | int }}
                    {% else %}
                      10
                    {% endif %}
      - action: script.global_notify
        data:
          notify_service_override: "input_text.notify_service_unavailable"
          message: |
            {% if count == 0 %}
            🟢 Toate dispozitivele funcționzează!
            {% elif count == 1 %}
            🔴 Este un dispozitiv indisponibil:
            – {{ state_attr('sensor.unavailable_entities','names').split(',') | join('\n–') }}
            {% else %}
            🔴 Sunt {{ count }} dispozitive indisponibile:
            – {{ state_attr('sensor.unavailable_entities','names').split(',') | join('\n–') }}
            {% endif %}
      - action: input_number.set_value
        target:
          entity_id: input_number.unavailable_entities_last_triggered
        data:
          value: "{{ count }}"

  - id: "unavailable_sensors"
    alias: "𐃏 Unavailable Sensors"
    mode: restart
    triggers:
      - trigger: state
        entity_id: sensor.unavailable_sensors
      - trigger: homeassistant
        event: start
    condition:
      - condition: state
        entity_id: input_boolean.maintenance_mode
        state: "off"
      - condition: template
        value_template: "{{ states.sensor.unavailable_sensors.state is defined }}"
    actions:
      - variables:
          count: "{{ states('sensor.unavailable_sensors') | int(0) }}"
          last_triggered: "{{ states('input_number.unavailable_sensors_last_triggered') | int(0) }}"
      - condition: template
        value_template: "{{ count != last_triggered }}"
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ count > 0 }}"
            sequence:
              - delay: 
                  minutes: >-
                    {% if states.input_number.delay_notify_unavailable.state is defined %}
                      {{ states('input_number.delay_notify_unavailable') | int }}
                    {% else %}
                      10
                    {% endif %}
      - action: script.global_notify
        data:
          notify_service_override: "input_text.notify_service_unavailable"
          message: |
            {% if count == 0 %}
            🟢 Toți senzorii funcționzează!
            {% elif count == 1 %}
            🔴 Este un senzor indisponibil:
            – {{ state_attr('sensor.unavailable_sensors','names').split(',') | join('\n–') }}
            {% else %}
            🔴 Sunt {{ count }} senzori indisponibili:
            – {{ state_attr('sensor.unavailable_sensors','names').split(',') | join('\n–') }}
            {% endif %}
      - action: input_number.set_value
        target:
          entity_id: input_number.unavailable_sensors_last_triggered
        data:
          value: "{{ count }}"
