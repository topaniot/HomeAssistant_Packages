# ==================================================================================
# Package: Unavailable Entities Monitor
# Version: 2026.06.1
# Description:
#   Monitors devices and sensors for 'unavailable' or 'none' states.
#   Provides automated notifications with configurable delay and service selection.
#
# --- Helpers ---
# To customize this package, create the following helpers:
#
# 1. input_text.notify_service (General/Global)
#    - Name: "𐃏 Notify Service"
#    - Purpose: Default notification service used by this and other packages.
#
# 2. input_number.delay_notify_unavailable
#    - Name: "𐃏 Delay Notifiy Unavailable"
#    - Purpose: Delay (in minutes) before notification triggers.
#
# 3. input_text.notify_service_unavailable (Optional)
#    - Name: "𐃏 Notify Service Unavailable"
#    - Purpose: Specific notification service for this package.
#
# 4. input_text.telegram_chat_id (Optional)
#    - Name: "𐃏 Telegram Chat ID"
#    - Purpose: Required only if using Telegram; contains the target chat ID.
#
# --- Configuration ---
# - Entity Exclusion: Assign the label "ignore" to any entity you wish to exclude
#   from monitoring.
# ==================================================================================

script:
  # Script to update this package from GitHub
  update_packages:
    sequence:
      - action: downloader.download_file
        data:
          overwrite: true
          url: >-
            {% set url = 'https://raw.githubusercontent.com/' %}
            {% if states.input_text.packages_account.state is defined %}
              {% set account = states('input_text.packages_account') %}
            {% else %}
              {% set account = 'topaniot' %}
            {% endif %}
            {% set path = '/HomeAssistant_Packages/main/packages/' %}
            {% set name = 'unavailable_entities.yaml' %}
            {{ url + account + path + name }}

template:
  - trigger:
      - trigger: time_pattern
        seconds: "/1"
    sensor:
      - name: "𐃏 Unavailable Entities"
        icon: "hass:shape"
        state: >
              {% set ignored = label_entities('ignore') %}
                    
              {{ states
                |selectattr('domain','in',['switch','light','cover','climate','camera','lock','remote'])
                |selectattr('state','in',['unavailable','none'])
                |rejectattr('entity_id','in', ignored )
                |list|count
              }}
        attributes:
            names: >
              {% set ignored = label_entities('ignore') %}
                    
              {{ states
                |selectattr('domain','in',['switch','light','cover','climate','camera','lock','remote'])
                |selectattr('state','in',['unavailable','none'])
                |rejectattr('entity_id','in', ignored )
                |map(attribute='name')|join(', ')
              }}

  - trigger:
      - trigger: time_pattern
        seconds: "/1"
    sensor:
      - name: "𐃏 Unavailable Sensors"
        icon: "hass:shape"
        state: >
              {% set ignored = label_entities('ignore') %}
                    
              {{ states
                |selectattr('domain','in',['sensor','binary_sensor'])
                |selectattr('attributes.device_class','defined')
                |selectattr('attributes.device_class','in',['temperature','energy','window','door','opening'])
                |selectattr('state', 'in', ['unavailable','none'])
                |rejectattr('entity_id','in', ignored )
                |list|count
              }}
        attributes:
            names: >
              {% set ignored = label_entities('ignore') %}
                  
              {{ states
                |selectattr('domain','in',['sensor','binary_sensor'])
                |selectattr('attributes.device_class','defined')
                |selectattr('attributes.device_class','in',['temperature','energy','window','door','opening'])
                |selectattr('state', 'in', ['unavailable','none'])
                |rejectattr('entity_id','in', ignored )
                |map(attribute='name')|join (", ")
              }}

input_number:
  unavailable_entities_last_triggered:
    name: "𐃏 Unavailable Entities Last Triggered"
    icon: "hass:alert-circle"
    mode: box
    min: 0
    max: 99999
    step: 1
  unavailable_sensors_last_triggered:
    name: "𐃏 Unavailable Sensors Last Triggered"
    icon: "hass:alert-circle"
    mode: box
    min: 0
    max: 99999
    step: 1

automation:
  - id: "unavailable_entities"
    alias: "𐃏 Unavailable Entities"
    mode: restart
    triggers:
      - trigger: state
        entity_id: sensor.unavailable_entities
      - trigger: homeassistant
        event: start
      - trigger: state
        entity_id:
          - input_boolean.maintenance_mode
        to: "off"
    condition:
      - condition: state
        entity_id: input_boolean.maintenance_mode
        state: "off"
      - condition: template
        value_template: "{{ states.sensor.unavailable_entities.state is defined }}"
    actions:
      - variables:
          count: "{{ states('sensor.unavailable_entities') | int(0) }}"
          last_triggered: "{{ states('input_number.unavailable_entities_last_triggered') | int(0) }}"
      - condition: template
        value_template: "{{ count != last_triggered }}"
      - variables:
          notify_service: >-
            {% set server = states('input_text.notify_service_server') %}
            {% set general = states('input_text.notify_service') %}
            {% if server not in ['unknown', 'unavailable', ''] %}
              {{ server }}
            {% elif general not in ['unknown', 'unavailable', ''] %}
              {{ general }}
            {% else %}
              notify.notify
            {% endif %}
          notify_message: |
            {% if count == 0 %}
            🟢 Toate dispozitivele funcționzează!
            {% elif count == 1 %}
            🔴 Este un dispozitiv indisponibil:
            – {{ state_attr('sensor.unavailable_entities','names').split(',') | join('\n–') }}
            {% else %}
            🔴 Sunt {{ count }} dispozitive indisponibile:
            – {{ state_attr('sensor.unavailable_entities','names').split(',') | join('\n–') }}
            {% endif %}
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ count > 0 }}"
            sequence:
              - delay: 
                  minutes: >-
                    {% if states.input_number.delay_notify_unavailable.state is defined %}
                      {{ states('input_number.delay_notify_unavailable') | int }}
                    {% else %}
                      10
                    {% endif %}
      - choose:
          - conditions:
              - condition: template
                value_template: >-
                  {{ notify_service == 'telegram_bot.send_message' and states('input_text.telegram_chat_id') not in ['unknown', 'unavailable', ''] }}
            sequence:
              - action: "{{ notify_service }}"
                data:
                  entity_id: "{{ states('input_text.telegram_chat_id') }}"
                  message: "{{ notify_message }}"
        default:
          - action: "{{ notify_service }}"
            data:
              message: "{{ notify_message }}"
      - action: input_number.set_value
        target:
          entity_id: input_number.unavailable_entities_last_triggered
        data:
          value: "{{ count }}"

  - id: "unavailable_sensors"
    alias: "𐃏 Unavailable Sensors"
    mode: restart
    triggers:
      - trigger: state
        entity_id: sensor.unavailable_sensors
      - trigger: homeassistant
        event: start
    condition:
      - condition: state
        entity_id: input_boolean.maintenance_mode
        state: "off"
      - condition: template
        value_template: "{{ states.sensor.unavailable_sensors.state is defined }}"
    actions:
      - variables:
          count: "{{ states('sensor.unavailable_sensors') | int(0) }}"
          last_triggered: "{{ states('input_number.unavailable_sensors_last_triggered') | int(0) }}"
      - condition: template
        value_template: "{{ count != last_triggered }}"
      - variables:
          notify_service: >-
            {% set server = states('input_text.notify_service_server') %}
            {% set general = states('input_text.notify_service') %}
            {% if server not in ['unknown', 'unavailable', ''] %}
              {{ server }}
            {% elif general not in ['unknown', 'unavailable', ''] %}
              {{ general }}
            {% else %}
              notify.notify
            {% endif %}
          notify_message: |
            {% if count == 0 %}
            🟢 Toți senzorii funcționzează!
            {% elif count == 1 %}
            🔴 Este un senzor indisponibil:
            – {{ state_attr('sensor.unavailable_sensors','names').split(',') | join('\n–') }}
            {% else %}
            🔴 Sunt {{ count }} senzori indisponibili:
            – {{ state_attr('sensor.unavailable_sensors','names').split(',') | join('\n–') }}
            {% endif %}
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ count > 0 }}"
            sequence:
              - delay: 
                  minutes: >-
                    {% if states.input_number.delay_notify_unavailable.state is defined %}
                      {{ states('input_number.delay_notify_unavailable') | int }}
                    {% else %}
                      10
                    {% endif %}
      - choose:
          - conditions:
              - condition: template
                value_template: >-
                  {{ notify_service == 'telegram_bot.send_message' and states('input_text.telegram_chat_id') not in ['unknown', 'unavailable', ''] }}
            sequence:
              - action: "{{ notify_service }}"
                data:
                  entity_id: "{{ states('input_text.telegram_chat_id') }}"
                  message: "{{ notify_message }}"
        default:
          - action: "{{ notify_service }}"
            data:
              message: "{{ notify_message }}"
      - action: input_number.set_value
        target:
          entity_id: input_number.unavailable_sensors_last_triggered
        data:
          value: "{{ count }}"
