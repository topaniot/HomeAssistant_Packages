# ==================================================================================
# Package: Updates Available Monitor
# Version: 2026.06.1
# Description:
#   Auto-updates addons, firmware, core, and OS. Monitors for available updates,
#   manages automated installation based on delays, and sends notifications.
#
# --- Required Helpers ---
# To customize this package, create the following helpers:
#
# 1. input_number.delay_notify_updates (Optional)
#    - Name: "𐃏 Delay Notifiy Updates"
#    - Purpose: Hours to wait until sending update availability notification.
#
# 2. input_number.delay_update
#    - Name: "𐃏 Delay Update"
#    - Purpose: Delay (hours) for major updates before installation.
#
# 3. input_number.delay_update_minor
#    - Name: "𐃏 Delay Update minor"
#    - Purpose: Delay (hours) for minor updates before installation.
#
# 4. input_text.notify_service_updates (Optional)
#    - Name: "𐃏 Notify Service Updates"
#    - Purpose: Specific notification service for this package.
#
# 5. input_datetime.notify_updates_time / input_datetime.auto_update_time
#    - Name: "Notify Updates Time" / "Auto Update Time"
#    - Purpose: Set specific times for notifications and auto-updates.
#
# 6. input_boolean.maintenance_mode
#    - Name: "Maintenance Mode"
#    - Purpose: Pause all updates and notifications.
#
# --- Configuration ---
# - Entity Exclusion: Assign the label "ignore" to any entity you wish to exclude.
# ==================================================================================

script:
  # Script to update this package from GitHub
  update_packages:
    sequence:
      - action: downloader.download_file
        data:
          overwrite: true
          url: >-
            {% set url = 'https://raw.githubusercontent.com/' %}
            {% if states.input_text.packages_account.state is defined %}
              {% set account = states('input_text.packages_account') %}
            {% else %}
              {% set account = 'topaniot' %}
            {% endif %}
            {% set path = '/HomeAssistant_Packages/main/packages/' %}
            {% set name = 'updates_available.yaml' %}
            {{ url + account + path + name }}

template:
  - trigger:
      - trigger: time_pattern
        seconds: "/1"
    sensor:
      - name: "𐃏 Updates Available"
        icon: "hass:update"
        state: >
          {% set ignored = label_entities('ignore') %}
          {% set result = namespace(updates=[]) %}
          {% set hours_map = {0: 48, 1: 144} %}

          {% for state in states.update 
            |selectattr('state', '==', 'on')
            |rejectattr('entity_id','in', ignored ) 
          %}
            {% set current = state_attr(state.entity_id, 'installed_version') %}
            {% set latest = state_attr(state.entity_id, 'latest_version') %}
            {% if current and latest %}
              {% set cp = current.split('.') %}
              {% set lp = latest.split('.') %}
              {# If only the patch differs then it's a minor update (update_status = 0), otherwise it's major (update_status = 1) #}
              {% set update_status = 0 if cp[0] == lp[0] and cp[1] == lp[1] and cp[2] != lp[2] else 1 %}
              {# For minor update use delay_update_minor, for major update use delay_update #}
              {% set hours = (states('input_number.delay_update_minor')|int + 24)
                  if update_status == 0 and states('input_number.delay_update_minor') not in ['unknown', None]
                  else ((states('input_number.delay_update')|int + 24)
                  if update_status == 1 and states('input_number.delay_update') not in ['unknown', None]
                  else hours_map[update_status])
              %}
              {% if as_timestamp(state.last_changed) + 3600 * hours < as_timestamp(now()) %}
                {% set result.updates 
                = result.updates + [state.name 
                ~ ' (' ~ state.attributes.installed_version ~ ' -> ' 
                ~ state.attributes.latest_version ~ ')'] 
                %}
                
              {% endif %}
            {% endif %}
          {% endfor %}

          {{ result.updates|count }}
        attributes:
          names: >
            {% set ignored = label_entities('ignore') %}
            {% set result = namespace(updates=[]) %}
            {% set hours_map = {0: 48, 1: 144} %}

            {% for state in states.update 
              |selectattr('state', '==', 'on')
              |rejectattr('entity_id','in', ignored ) 
            %}
              {% set current = state_attr(state.entity_id, 'installed_version') %}
              {% set latest = state_attr(state.entity_id, 'latest_version') %}
              {% if current and latest %}
                {% set cp = current.split('.') %}
                {% set lp = latest.split('.') %}
                {# If only the patch differs then it's a minor update (update_status = 0), otherwise it's major (update_status = 1) #}
                {% set update_status = 0 if cp[0] == lp[0] and cp[1] == lp[1] and cp[2] != lp[2] else 1 %}
                {# For minor update use delay_update_minor, for major update use delay_update #}
                {% set hours = (states('input_number.delay_update_minor')|int + 24)
                    if update_status == 0 and states('input_number.delay_update_minor') not in ['unknown', None]
                    else ((states('input_number.delay_update')|int + 24)
                    if update_status == 1 and states('input_number.delay_update') not in ['unknown', None]
                    else hours_map[update_status])
                %}
                {% if as_timestamp(state.last_changed) + 3600 * hours < as_timestamp(now()) %}
                  {% set result.updates 
                  = result.updates + [state.name 
                  ~ ' (' ~ state.attributes.installed_version ~ ' -> ' 
                  ~ state.attributes.latest_version ~ ')'] 
                  %}
                  
                {% endif %}
              {% endif %}
            {% endfor %}

            {{ result.updates|join (', ') }}

      - name: "𐃏 Updates in Progress"
        icon: "hass:update"
        state: >
          {{ states.update
            |selectattr('attributes.in_progress','defined')
            |selectattr('attributes.in_progress','true')
            |list|count
          }}
        attributes:
          names: >
            {{ states.update
              |selectattr('attributes.in_progress','defined')
              |selectattr('attributes.in_progress','true')
              |map(attribute='name')|join (", ")
            }}

input_boolean:
  update_available_alert:
    name: "𐃏 Update Available Alert"
    icon: "hass:alert-circle"
  update_in_progress_alert:
    name: "𐃏 Update in Progress Alert"
    icon: "hass:alert-circle"

automation:
  # Notify when updates are available
  - id: "updates_available"
    alias: "𐃏 Updates Available"
    description: ""
    triggers:
      - trigger: template
        value_template: |-
          {% set current_day = now().weekday() %}
          {% if states.input_datetime.notify_updates_time.state is defined %}
              {% set time = states('input_datetime.notify_updates_time') %}
              {% set allow_update = true %}
          {% elif current_day in [0, 1, 2, 3] %}
              {% set time = "10:00:00" %}
              {% set allow_update = true %}
          {% else %}
              {% set allow_update = false %}
          {% endif %}
          {{ allow_update and time == now().timestamp() | timestamp_custom('%H:%M:%S') }}
      - trigger: state
        entity_id:
          - input_boolean.maintenance_mode
        to: "off"
        for: 00:01:00
    condition:
      - condition: state
        entity_id: input_boolean.maintenance_mode
        state: "off"
      - condition: template
        value_template: "{{ states.sensor.updates_available.state is defined }}"
    actions:
      - variables:
          count: "{{ states('sensor.updates_available') | int(0) }}"
          notify_service: >-
            {% set server = states('input_text.notify_service_server') %}
            {% set general = states('input_text.notify_service') %}
            {% if server not in ['unknown', 'unavailable', ''] %}
              {{ server }}
            {% elif general not in ['unknown', 'unavailable', ''] %}
              {{ general }}
            {% else %}
              notify.notify
            {% endif %}
          notify_message: |
            {% if count == 0 %}
            🎉 Dispozitivele și serviciile sunt actualizate!
            {% elif count == 1 %}
            ⚙️ Este o actualizare disponibilă:
            – {{ state_attr('sensor.updates_available','names').split(',') | join('\n–') }}
            {% else %}
            ⚙️ Sunt {{ count }} actualizări disponibile:
            – {{ state_attr('sensor.updates_available','names').split(',') | join('\n–') }}
            {% endif %}
      - condition: template
        value_template: "{{ count > 0 or is_state('input_boolean.update_available_alert', 'on') }}"
      - choose:
          - conditions:
              - condition: template
                value_template: >-
                  {{ notify_service == 'telegram_bot.send_message' and states('input_text.telegram_chat_id') not in ['unknown', 'unavailable', ''] }}
            sequence:
              - action: "{{ notify_service }}"
                data:
                  entity_id: "{{ states('input_text.telegram_chat_id') }}"
                  message: "{{ notify_message }}"
                  disable_notification: true
        default:
          - action: "{{ notify_service }}"
            data:
              message: "{{ notify_message }}"
              disable_notification: true
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ count > 0 }}"
            sequence:
              - action: input_boolean.turn_on
                target:
                  entity_id: input_boolean.update_available_alert
          - conditions:
              - condition: template
                value_template: "{{ count == 0 }}"
            sequence:
              - action: input_boolean.turn_off
                target:
                  entity_id: input_boolean.update_available_alert
    mode: restart

  # Notify when updates are in progress
  - id: "updates_in_progress"
    alias: "𐃏 Updates in Progress"
    mode: restart
    triggers:
      - trigger: state
        entity_id: sensor.updates_in_progress
      - trigger: homeassistant
        event: start
    condition:
      - condition: state
        entity_id: input_boolean.maintenance_mode
        state: "off"
      - condition: template
        value_template: "{{ states.sensor.updates_in_progress.state is defined }}"
    actions:
      - delay:
          seconds: 10
      - variables:
          count: "{{ states('sensor.updates_in_progress') | int(0) }}"
          notify_service: >-
            {% set server = states('input_text.notify_service_server') %}
            {% set general = states('input_text.notify_service') %}
            {% if server not in ['unknown', 'unavailable', ''] %}
              {{ server }}
            {% elif general not in ['unknown', 'unavailable', ''] %}
              {{ general }}
            {% else %}
              notify.notify
            {% endif %}
          notify_message: |
            {% if count == 0 %}
            🎉 Actualizare finalizată!
            {% elif count == 1 %}
            🔧 Este o actualizare în progress:
            – {{ state_attr('sensor.updates_in_progress','names').split(',') | join('\n–') }}
            {% else %}
            🔧 Sunt {{ count }} actualizări în progress:
            – {{ state_attr('sensor.updates_in_progress','names').split(',') | join('\n–') }}
            {% endif %}
      - condition: template
        value_template: "{{ count > 0 or is_state('input_boolean.update_in_progress_alert', 'on') }}"
      - choose:
          - conditions:
              - condition: template
                value_template: >-
                  {{ notify_service == 'telegram_bot.send_message' and states('input_text.telegram_chat_id') not in ['unknown', 'unavailable', ''] }}
            sequence:
              - action: "{{ notify_service }}"
                data:
                  entity_id: "{{ states('input_text.telegram_chat_id') }}"
                  message: "{{ notify_message }}"
                  disable_notification: true
        default:
          - action: "{{ notify_service }}"
            data:
              message: "{{ notify_message }}"
              disable_notification: true
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ count > 0 }}"
            sequence:
              - action: input_boolean.turn_on
                target:
                  entity_id: input_boolean.update_in_progress_alert
          - conditions:
              - condition: template
                value_template: "{{ count == 0 }}"
            sequence:
              - action: input_boolean.turn_off
                target:
                  entity_id: input_boolean.update_in_progress_alert

  # Auto install updates
  - id: "auto_update"
    alias: "𐃏 Auto Update"
    description: ""
    triggers:
      - trigger: template
        value_template: |-
          {% set current_day = now().weekday() %}
          {% if states.input_datetime.auto_update_time.state is defined %}
              {% set time = states('input_datetime.auto_update_time') %}
              {% set allow_update = true %}
          {% elif current_day in [0, 1, 2, 3] %}
              {% set time = "03:30:00" %}
              {% set allow_update = true %}
          {% else %}
              {% set allow_update = false %}
          {% endif %}
          {{ allow_update and time == now().timestamp() | timestamp_custom('%H:%M:%S') }}
    condition: []
    action:
      # Addons & HACS Update
      - if:
          - condition: template
            value_template: |-
              {% set ignored = label_entities('ignore') %}
              {% set result = namespace(updates=[]) %}
              {% set hours_map = {0: 24, 1: 120} %}
              {% for state in states.update 
                |selectattr('state', '==', 'on')
                |rejectattr('attributes.device_class', '==', 'firmware')
                |rejectattr('entity_id','in', ignored ) 
                |rejectattr('entity_id', 'in', 
                  [
                    'update.home_assistant_operating_system_update',
                    'update.home_assistant_core_update',
                    'update.esphome_device_builder_update',
                    'update.esphome_update'
                  ])
              %}
                {% set current = state_attr(state.entity_id, 'installed_version') %}
                {% set latest = state_attr(state.entity_id, 'latest_version') %}
                {% if current and latest %}
                  {% set cp = current.split('.') %}
                  {% set lp = latest.split('.') %}
                  {# If only the patch differs then it's a minor update (update_status = 0), otherwise it's major (update_status = 1) #}
                  {% set update_status = 0 if cp[0] == lp[0] and cp[1] == lp[1] and cp[2] != lp[2] else 1 %}
                  {# For minor update use delay_update_minor, for major update use delay_update #}
                  {% set hours = (states('input_number.delay_update_minor')|int)
                      if update_status == 0 and states('input_number.delay_update_minor') not in ['unknown', None]
                      else ((states('input_number.delay_update')|int)
                      if update_status == 1 and states('input_number.delay_update') not in ['unknown', None]
                      else hours_map[update_status])
                  %}
                  {% if as_timestamp(state.last_changed) + 3600 * hours < as_timestamp(now()) %}
                    {% set result.updates = result.updates + [state.entity_id] %}
                  {% endif %}
                {% endif %}
              {% endfor %}
              {{ result.updates|count > 0 }}
        then:
          - action: update.install
            target:
              entity_id: |-
                {% set ignored = label_entities('ignore') %}
                {% set result = namespace(updates=[]) %}
                {% set hours_map = {0: 24, 1: 120} %}
                {% for state in states.update 
                  |selectattr('state', '==', 'on')
                  |rejectattr('attributes.device_class', '==', 'firmware')
                  |rejectattr('entity_id','in', ignored ) 
                  |rejectattr('entity_id', 'in', 
                    [
                      'update.home_assistant_operating_system_update',
                      'update.home_assistant_core_update',
                      'update.esphome_device_builder_update',
                      'update.esphome_update'
                    ])
                %}
                  {% set current = state_attr(state.entity_id, 'installed_version') %}
                  {% set latest = state_attr(state.entity_id, 'latest_version') %}
                  {% if current and latest %}
                    {% set cp = current.split('.') %}
                    {% set lp = latest.split('.') %}
                    {# If only the patch differs then it's a minor update (update_status = 0), otherwise it's major (update_status = 1) #}
                    {% set update_status = 0 if cp[0] == lp[0] and cp[1] == lp[1] and cp[2] != lp[2] else 1 %}
                    {# For minor update use delay_update_minor, for major update use delay_update #}
                    {% set hours = (states('input_number.delay_update_minor')|int)
                        if update_status == 0 and states('input_number.delay_update_minor') not in ['unknown', None]
                        else ((states('input_number.delay_update')|int)
                        if update_status == 1 and states('input_number.delay_update') not in ['unknown', None]
                        else hours_map[update_status])
                    %}
                    {% if as_timestamp(state.last_changed) + 3600 * hours < as_timestamp(now()) %}
                      {% set result.updates = result.updates + [state.entity_id] %}
                    {% endif %}
                  {% endif %}
                {% endfor %}
                {{ result.updates|list }}

      # Firmware Update
      - if:
          - condition: template
            value_template: |-
              {% set ignored = label_entities('ignore') %}

              {% set result = namespace(updates=[]) %}
                {% if states.input_number.delay_update.state is defined %}
                  {% set hours = states('input_number.delay_update') | int %}
                {% else %}
                  {% set hours = 96 %}
                {% endif %}
                
              {% for state in states.update 
                |selectattr('state', '==', 'on')
                |selectattr('attributes.device_class', '==', 'firmware')
                |rejectattr('attributes.title', '==', 'ESPHome')
                |rejectattr('entity_id','in', ignored )
              %}
                {% if as_timestamp(state.last_changed) | int + 60*60*hours < as_timestamp(now()) | int %}
                  {% set result.updates = result.updates + [state.entity_id] %}
                {% endif %}
              {% endfor %}

              {{ result.updates|count > 0 }}
        then:
          - action: update.install
            continue_on_error: true
            target:
              entity_id: |-
                {% set ignored = label_entities('ignore') %}

                {% set result = namespace(updates=[]) %}
                  {% if states.input_number.delay_update.state is defined %}
                    {% set hours = states('input_number.delay_update') | int %}
                  {% else %}
                    {% set hours = 96 %}
                  {% endif %}
                  
                {% for state in states.update 
                  |selectattr('state', '==', 'on')
                  |selectattr('attributes.device_class', '==', 'firmware')
                  |rejectattr('attributes.title', '==', 'ESPHome')
                  |rejectattr('entity_id','in', ignored )
                %}
                  {% if as_timestamp(state.last_changed) | int + 60*60*hours < as_timestamp(now()) | int %}
                    {% set result.updates = result.updates + [state.entity_id] %}
                  {% endif %}
                {% endfor %}
                {{ result.updates | list }}

      # ESPHome Update
      - if:
          - condition: template
            value_template: |-
              {% set ignored = label_entities('ignore') %}
              {% set result = namespace(updates=[]) %}
              {% set hours_map = {0: 24, 1: 120} %}

              {% for state in states.update 
                |selectattr('state', 'eq', 'on')
                |selectattr('entity_id', 'in', ['update.esphome_device_builder_update', 'update.esphome_update' ])
                |rejectattr('entity_id','in', ignored )  
              %}
                {% set current = state_attr(state.entity_id, 'installed_version') %}
                {% set latest = state_attr(state.entity_id, 'latest_version') %}
                {% if current and latest %}
                  {% set cp = current.split('.') %}
                  {% set lp = latest.split('.') %}
                  {# If only the patch differs then it's a minor update (update_status = 0), otherwise it's major (update_status = 1) #}
                  {% set update_status = 0 if cp[0] == lp[0] and cp[1] == lp[1] and cp[2] != lp[2] else 1 %}
                  {# For minor update use delay_update_minor, for major update use delay_update #}
                  {% set hours = (states('input_number.delay_update_minor')|int)
                      if update_status == 0 and states('input_number.delay_update_minor') not in ['unknown', None]
                      else ((states('input_number.delay_update')|int)
                      if update_status == 1 and states('input_number.delay_update') not in ['unknown', None]
                      else hours_map[update_status])
                  %}
                  {% if as_timestamp(state.last_changed) + 3600 * hours < as_timestamp(now()) %}
                    {% set result.updates = result.updates + [state.entity_id] %}
                  {% endif %}
                {% endif %}
              {% endfor %}
              {{ result.updates | count > 0 }}
        then:
          - action: update.install
            continue_on_error: true
            target:
              entity_id: |-
                {% set ignored = label_entities('ignore') %}
                {% set result = namespace(updates=[]) %}
                {% set hours_map = {0: 24, 1: 120} %}

                {% for state in states.update 
                  |selectattr('state', 'eq', 'on')
                  |selectattr('entity_id', 'in', ['update.esphome_device_builder_update', 'update.esphome_update' ])
                  |rejectattr('entity_id','in', ignored )  
                %}
                  {% set current = state_attr(state.entity_id, 'installed_version') %}
                  {% set latest = state_attr(state.entity_id, 'latest_version') %}
                  {% if current and latest %}
                    {% set cp = current.split('.') %}
                    {% set lp = latest.split('.') %}
                    {# If only the patch differs then it's a minor update (update_status = 0), otherwise it's major (update_status = 1) #}
                    {% set update_status = 0 if cp[0] == lp[0] and cp[1] == lp[1] and cp[2] != lp[2] else 1 %}
                    {# For minor update use delay_update_minor, for major update use delay_update #}
                    {% set hours = (states('input_number.delay_update_minor')|int)
                        if update_status == 0 and states('input_number.delay_update_minor') not in ['unknown', None]
                        else ((states('input_number.delay_update')|int)
                        if update_status == 1 and states('input_number.delay_update') not in ['unknown', None]
                        else hours_map[update_status])
                    %}
                    {% if as_timestamp(state.last_changed) + 3600 * hours < as_timestamp(now()) %}
                      {% set result.updates = result.updates + [state.entity_id] %}
                    {% endif %}
                  {% endif %}
                {% endfor %}
                {{ result.updates | list }}
          - wait_template: |-
              {% set ignored = label_entities('ignore') %}

              {% set result = namespace(updates=[]) %}
              {% for state in states.update 
                |selectattr('state', '==', 'on')
                |selectattr('attributes.title', '==', 'ESPHome')
                |rejectattr('entity_id', 'in', ['update.esphome_device_builder_update', 'update.esphome_update' ])
                |rejectattr('entity_id','in', ignored )  
              %}
                {% set result.updates = result.updates + [state.entity_id] %}
              {% endfor %}
              {{ result.updates | count > 0 }}
            continue_on_timeout: true
            timeout: "00:30:00"
          - delay: "00:02:00"
      - if:
          - condition: template
            value_template: |-
              {% set ignored = label_entities('ignore') %}

              {% set result = namespace(updates=[]) %}
              {% for state in states.update 
                |selectattr('state', '==', 'on')
                |selectattr('attributes.title', '==', 'ESPHome')
                |rejectattr('entity_id', 'in', ['update.esphome_device_builder_update', 'update.esphome_update'])
                |rejectattr('entity_id','in', ignored )  
              %}
                {% set result.updates = result.updates + [state.entity_id] %}
              {% endfor %}

              {{ result.updates|count > 0 }}
        then:
          - action: update.install
            continue_on_error: true
            target:
              entity_id: |-
                {% set ignored = label_entities('ignore') %}

                {% set result = namespace(updates=[]) %}
                {% for state in states.update 
                  |selectattr('state', '==', 'on')
                  |selectattr('attributes.title', '==', 'ESPHome')
                  |rejectattr('entity_id', 'in', ['update.esphome_device_builder_update', 'update.esphome_update'])
                  |rejectattr('entity_id','in', ignored )  
                %}
                  {% set result.updates = result.updates + [state.entity_id] %}
                {% endfor %}

                {{ result.updates|list }}

      # Wait to finish updates in progress
      - wait_template: "{{ states('sensor.updates_in_progress') | int == 0 }}"

      # Core Update
      - if:
          - condition: template
            value_template: |-
              {% set ignored = label_entities('ignore') %}
              {% set result = namespace(updates=[]) %}
              {% set hours_map = {0: 24, 1: 120} %}

              {% for state in states.update 
                |selectattr('state', 'eq', 'on')
                |selectattr('entity_id', 'in', ['update.home_assistant_core_update' ])
                |rejectattr('entity_id','in', ignored )  
              %}
                {% set current = state_attr(state.entity_id, 'installed_version') %}
                {% set latest = state_attr(state.entity_id, 'latest_version') %}
                {% if current and latest %}
                  {% set cp = current.split('.') %}
                  {% set lp = latest.split('.') %}
                  {# If only the patch differs then it's a minor update (update_status = 0), otherwise it's major (update_status = 1) #}
                  {% set update_status = 0 if cp[0] == lp[0] and cp[1] == lp[1] and cp[2] != lp[2] else 1 %}
                  {# For minor update use delay_update_minor, for major update use delay_update #}
                  {% set hours = (states('input_number.delay_update_minor')|int)
                      if update_status == 0 and states('input_number.delay_update_minor') not in ['unknown', None]
                      else ((states('input_number.delay_update')|int)
                      if update_status == 1 and states('input_number.delay_update') not in ['unknown', None]
                      else hours_map[update_status])
                  %}
                  {% if as_timestamp(state.last_changed) + 3600 * hours < as_timestamp(now()) %}
                    {% set result.updates = result.updates + [state.entity_id] %}
                  {% endif %}
                {% endif %}
              {% endfor %}
              {{ result.updates | count > 0 }}
        then:
          - action: update.install
            continue_on_error: true
            target:
              entity_id: update.home_assistant_core_update

      # Wait to finish updates in progress
      - wait_template: "{{ states('sensor.updates_in_progress') | int == 0 }}"

      # OS Update
      - if:
          - condition: template
            value_template: |-
              {% set ignored = label_entities('ignore') %}

              {% set result = namespace(updates=[]) %}
              {% if states.input_number.delay_update.state is defined %}
                {% set hours = states('input_number.delay_update') | int %}
              {% else %}
                {% set hours = 120 %}
              {% endif %}

              {% for state in states.update 
                |selectattr('state', 'eq', 'on')
                |selectattr('entity_id', 'in', ['update.home_assistant_operating_system_update' ])
                |rejectattr('entity_id','in', ignored )  
              %}
                {% if as_timestamp(state.last_changed) | int + 60*60*hours < as_timestamp(now()) | int %}
                  {% set result.updates = result.updates + [state.entity_id] %}
                {% endif %}
              {% endfor %}

              {{ result.updates | count > 0 }}
        then:
          - action: update.install
            continue_on_error: true
            target:
              entity_id: update.home_assistant_operating_system_update
