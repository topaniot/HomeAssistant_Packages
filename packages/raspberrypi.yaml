# ==================================================================================
# Package: Raspberry PI Monitor
# Version: 2026.06.1
# Description:
#   Monitors Raspberry PI system health (CPU Temperature).
#   Provides automated alerts when temperature exceeds 80°C.
#
# --- Required Helpers ---
# To customize this package, create the following helpers:
#
# 1. input_text.notify_service_server (Optional)
#    - Name: "𐃏 Notify Service Server"
#    - Purpose: Specific notification service for server/PI alerts.
#
# 2. input_text.notify_service (General/Global)
#    - Name: "𐃏 Notify Service"
#    - Purpose: Default notification service used by this and other packages.
#
# 3. input_text.telegram_chat_id (Optional)
#    - Name: "𐃏 Telegram Chat ID"
#    - Purpose: Required only if using Telegram.
#
# --- Configuration ---
# - Maintenance Mode: This package respects 'input_boolean.maintenance_mode'.
# ==================================================================================

script:
  update_packages:
    sequence:
      - action: downloader.download_file
        data:
          overwrite: true
          url: >-
            {% set url = 'https://raw.githubusercontent.com/' %}
            {% if states.input_text.packages_account.state is defined %}
              {% set account = states('input_text.packages_account') %}
            {% else %}
              {% set account = 'topaniot' %}
            {% endif %}
            {% set path = '/HomeAssistant_Packages/main/packages/' %}
            {% set name = 'raspberrypi.yaml' %}
            {{ url + account + path + name }}

automation:
  - id: 'cpu_temp'
    alias: "𐃏 CPU Temperature"
    mode: single
    max_exceeded: silent
    triggers:
      - trigger: numeric_state
        entity_id: sensor.processor_temperature
        above: 80
    condition: 
      - condition: state
        entity_id: input_boolean.maintenance_mode
        state: "off"
    actions:
      - variables:
          notify_service: >-
            {% set server = states('input_text.notify_service_server') %}
            {% set general = states('input_text.notify_service') %}
            {% if server not in ['unknown', 'unavailable', ''] %}
              {{ server }}
            {% elif general not in ['unknown', 'unavailable', ''] %}
              {{ general }}
            {% else %}
              notify.notify
            {% endif %}
      
      # Notify High Temperature
      - choose:
          - conditions:
              - condition: template
                value_template: >-
                  {{ notify_service == 'telegram_bot.send_message' and states('input_text.telegram_chat_id') not in ['unknown', 'unavailable', ''] }}
            sequence:
              - action: "{{ notify_service }}"
                data:
                  entity_id: "{{ states('input_text.telegram_chat_id') }}"
                  message: "🟡 CPU Temp. = {{ states('sensor.processor_temperature') }}°C"
        default:
          - action: "{{ notify_service }}"
            data:
              message: "🟡 CPU Temp. = {{ states('sensor.processor_temperature') }}°C"

      - wait_template: "{{ states('sensor.processor_temperature') | float < 70 }}"

      # Notify Normal Temperature
      - choose:
          - conditions:
              - condition: template
                value_template: >-
                  {{ notify_service == 'telegram_bot.send_message' and states('input_text.telegram_chat_id') not in ['unknown', 'unavailable', ''] }}
            sequence:
              - action: "{{ notify_service }}"
                data:
                  entity_id: "{{ states('input_text.telegram_chat_id') }}"
                  message: "🟢 CPU Temp. = {{ states('sensor.processor_temperature') }}°C"
        default:
          - action: "{{ notify_service }}"
            data:
              message: "🟢 CPU Temp. = {{ states('sensor.processor_temperature') }}°C"
