# ==================================================================================
# Package: Server Monitor
# Version: 2026.07.1
# Description:
#   Monitors server health, handles updates, and manages maintenance modes.
#   Features a centralized global notification engine with parallel execution.
#
# --- Required Helpers & Dependencies ---
# 1. input_text.packages_account (Optional)
#    - Name: "𐃏 Packages Account"
#    - Purpose: GitHub account name for package updates. Defaults to 'topaniot'.
#
# 2. input_text.notify_service (General/Global)
#    - Name: "𐃏 Notify Service"
#    - Purpose: Default global notification service (e.g., notify.notify).
#
# 3. input_text.telegram_chat_id (General/Global)
#    - Name: "𐃏 Telegram Chat ID"
#    - Purpose: Default global chat ID; required only if using Telegram.
#
# 4. input_text.telegram_thread_id (General/Global)
#    - Name: "𐃏 Telegram Thread ID"
#    - Purpose: Default global Topic/Thread identifier for Telegram forum supergroups.

# 5. input_text.notify_service_server (Optional)
#    - Name: "𐃏 Notify Service Server"
#    - Purpose: Specific notification service for server alerts.
#    - If this is defined the global chat ID and Thread will be ignored. You need to define them.
#
# 7. input_text.telegram_chat_id_server (Optional)
#    - Name: "𐃏 Telegram Chat ID Server"
#    - Purpose: Specific Chat target ID; required only if using Telegram.
#
# 8. input_text.telegram_thread_id_server (Optional)
#    - Name: "𐃏 Telegram Thread ID Server"
#    - Purpose: Specific Topic/Thread identifier for Telegram forum supergroups.
#
# 9. input_text.notify_service_maintenance (Optional)
#    - Name: "𐃏 Notify Service Maintenance"
#    - Purpose: Specific notification service for server alerts.
#    - If this is defined the global chat ID and Thread will be ignored. You need to define them.
#
# 10. input_text.telegram_chat_id_maintenance (Optional)
#    - Name: "𐃏 Telegram Chat ID Maintenance"
#    - Purpose: Specific Chat target ID; required only if using Telegram.
#
# 11. input_text.telegram_thread_id_maintenance (Optional)
#    - Name: "𐃏 Telegram Thread ID Maintenance"
#    - Purpose: Specific Topic/Thread identifier for Telegram forum supergroups.
#
# ==================================================================================

script:
  # Script used for global notifications
  global_notify:
    alias: "𐃏 Global Notification Engine"
    mode: parallel
    max: 10
    fields:
      message: { required: true }
      title: { required: false }
      disable_notification: { required: false }
      notify_service_override: { required: false }
    sequence:
      - variables:
          # Procesare sufix (evită crash dacă override lipsește)
          suffix: >-
            {% set o = notify_service_override | default('', true) | string %}
            {% if o.startswith('input_text.notify_service_') %}
              {{ o | replace('input_text.notify_service_', '') }}
            {% else %}
              {{ '' }}
            {% endif %}
          # Determinare serviciu notificări
          notify_service: >-
            {% set ov = states(notify_service_override) %}
            {% set gen = states('input_text.notify_service') %}
            {% if ov not in ['unknown', 'unavailable', '', 'none'] %}
              {{ ov | trim }}
            {% elif gen not in ['unknown', 'unavailable', '', 'none'] %}
              {{ gen | trim }}
            {% else %}
              notify.notify
            {% endif %}
          # Preluare entitate chat (cu fallback general)
          chat: >-
            {% set spec = 'input_text.telegram_chat_id_' ~ suffix if suffix != '' else 'none' %}
            {% set gen = states('input_text.telegram_chat_id') %}
            {% if suffix != '' and states(spec) not in ['unknown', 'unavailable', '', 'none'] %}
              {{ states(spec) | trim }}
            {% else %}
              {{ gen | trim }}
            {% endif %}
          # Preluare entitate thread (cu fallback general)
          thread: >-
            {% set spec = 'input_text.telegram_thread_id_' ~ suffix if suffix != '' else 'none' %}
            {% set gen = states('input_text.telegram_thread_id') %}
            {% if suffix != '' and states(spec) not in ['unknown', 'unavailable', '', 'none'] %}
              {{ states(spec) | trim }}
            {% else %}
              {{ gen | trim }}
            {% endif %}
      - action: "{{ notify_service }}"
        data: >-
          {% set payload = {"message": message} %}
          {% if title is defined and title not in ['unknown', 'unavailable', '', 'none'] %}
            {% set payload = dict(payload, title=title) %}
          {% endif %}
          {% if notify_service == 'telegram_bot.send_message' %}
            {% set payload = dict(payload, parse_mode='html') %}
            {% if chat not in ['unknown', 'unavailable', '', 'none'] %}
              {% set payload = dict(payload, entity_id=[chat]) %}
            {% endif %}
            {% if thread not in ['unknown', 'unavailable', '', 'none'] %}
              {% set payload = dict(payload, message_thread_id=thread) %}
            {% endif %}
            {% if disable_notification is defined and disable_notification | default(false) %}
              {% set payload = dict(payload, disable_notification=true) %}
            {% endif %}
          {% endif %}
          {{ payload }}

  # Script to update this package from GitHub
  update_packages:
    alias: "𐃏 Update Packages"
    sequence:
      - action: downloader.download_file
        data:
          overwrite: true
          url: >-
            {% set url = 'https://raw.githubusercontent.com/' %}
            {% if states.input_text.packages_account.state is defined %}
              {% set account = states('input_text.packages_account') %}
            {% else %}
              {% set account = 'topaniot' %}
            {% endif %}
            {% set path = '/HomeAssistant_Packages/main/packages/' %}
            {% set name = 'server.yaml' %}
            {{ url + account + path + name }}

input_boolean:
  maintenance_mode:
    name: "𐃏 Maintenance Mode"
    icon: "hass:wrench-clock"

http:
  # ip_ban_enabled: true
  # login_attempts_threshold: 15
  # Setup NGINX
  use_x_forwarded_for: true
  trusted_proxies:
    - 172.30.33.0/24

# Enable log errors to fire events
system_log:
  fire_event: true

recorder:
  exclude:
    entities:
      - automation.healthchecks

rest_command:
  # monitor server with healthchecks.io
  healthchecks:
    url: !secret healthchecks

logbook:
  exclude:
    entity_globs:
      # Exclude Load Sensors
      - sensor.*_load_*
      - sensor.load_*

automation:
  # Update Packages on server STOP
  - id: "update_on_server_stop"
    alias: "𐃏 Update Packages on STOP"
    description: ""
    triggers:
      - trigger: homeassistant
        event: shutdown
      - trigger: webhook
        allowed_methods:
          - PUT
        local_only: false
        webhook_id: !secret update_packages_webhook
    condition: []
    actions:
      - action: script.turn_on
        target:
          entity_id: script.update_packages
      - delay:
          seconds: 10
    mode: single

  # Ping healthchecks.io every minute
  - id: "healthchecks_update"
    alias: "𐃏 HealthChecks"
    description: ""
    triggers:
      - trigger: time_pattern
        minutes: /1
    condition: []
    actions:
      - action: rest_command.healthchecks
    mode: restart

  # Notify on server start
  - id: "server_start"
    alias: "𐃏 Server Start"
    description: ""
    triggers:
      - trigger: homeassistant
        event: start
    condition:
      - condition: state
        entity_id: input_boolean.maintenance_mode
        state: "off"
    actions:
      - action: script.global_notify
        data:
          notify_service_override: "input_text.notify_service_server"
          message: "▶️ Serverul a pornit!"
    mode: single

  # Notify on server Stop
  - id: "server_stop"
    alias: "𐃏 Server Stop"
    description: ""
    triggers:
      - trigger: homeassistant
        event: shutdown
    condition:
      - condition: state
        entity_id: input_boolean.maintenance_mode
        state: "off"
    actions:
      - action: script.global_notify
        data:
          notify_service_override: "input_text.notify_service_server"
          message: "⏹️ Serverul s-a oprit!"
    mode: single

  # Notify when a notification can't be sent
  - id: failed_notification
    alias: "𐃏 Failed Notification"
    description: "Alert when a notification can't be sent."
    mode: single
    triggers:
      - trigger: event
        event_type: system_log_event
        event_data:
          level: ERROR
    conditions:
      - condition: template
        value_template: '{{ "Error sending message" in trigger.event.data.message[0] }}'
        enabled: true
    actions:
      - action: persistent_notification.create
        data:
          message: |
            ⚠️ A apărut o problemă la trimiterea unei notificari. Anunță echipa tehnică! 
          
            ℹ️ Detalii problemă: 
            {{ trigger.event.data.message }}

          title: Nu s-a putut trimite notificarea!
          notification_id: failed_notification

  # Notify when an automation fails
  - id: failed_automation
    alias: "𐃏 Failed Automation"
    description: "Alert when an automation fails to run."
    mode: single
    triggers:
      - trigger: event
        event_type: system_log_event
        event_data:
          level: ERROR
    conditions:
      - condition: template
        value_template: '{{ "homeassistant.components.automation" in trigger.event.data.name }}'
        enabled: true
      - condition: template
        value_template: '{{ "failed_automation" not in trigger.event.data.message[0] and "Failed Automation" not in trigger.event.data.message[0] }}'
    actions:
      - action: persistent_notification.create
        data:
          message: |
            ⚠️ A apărut o problemă la finalizarea unei automatizări. Anunță echipa tehnică!

            ℹ️ Detalii problemă: 
            {{ trigger.event.data.message[0] }}

          title: Nu s-a putut finaliza atomatizarea!
          notification_id: failed_automation
      - action: script.global_notify
        data:
          notify_service_override: "input_text.notify_service_server"
          message: |
            ⚠️ A apărut o problemă la finalizarea unei automatizări.

            ℹ️ Detalii problemă: 
            {{ trigger.event.data.message[0] }}

    # Reload things after script update_packages is run
  - id: "update_packages"
    alias: "𐃏 Update Packages"
    description: ""
    triggers:
      - trigger: state
        entity_id: script.update_packages
        from: "on"
        to: "off"
    condition: []
    actions:
      - delay:
          seconds: 10
      - action: homeassistant.reload_all
    mode: restart

    # Notify when CPU load 15m is above 10 and when goes back below 4
  - id: "cpu_load_15m"
    alias: "𐃏 CPU Load"
    description: ""
    triggers:
      - trigger: numeric_state
        entity_id: sensor.load_15m
        above: 5
    condition:
      - condition: state
        entity_id: input_boolean.maintenance_mode
        state: "off"
    actions:
      - action: script.global_notify
        data:
          notify_service_override: "input_text.notify_service_server"
          message: "🟡 CPU Load (15m) = {{ states('sensor.load_15m') }}"
      - wait_template: "{{ states('sensor.load_15m') | float < 4 }}"
      - action: script.global_notify
        data:
          notify_service_override: "input_text.notify_service_server"
          message: "🟢 CPU Load (15m) = {{ states('sensor.load_15m') }}"
    mode: single
    max_exceeded: silent

    # Notify when RAM is almost full
  - id: "ram_usage"
    alias: "𐃏 RAM Usage"
    description: ""
    triggers:
      - trigger: numeric_state
        entity_id: sensor.memory_use_percent
        above: 80
    condition:
      - condition: state
        entity_id: input_boolean.maintenance_mode
        state: "off"
    actions:
      - action: script.global_notify
        data:
          notify_service_override: "input_text.notify_service_server"
          message: "🟡 RAM = {{ states('sensor.memory_use_percent') }}%"
      - wait_template: "{{ states('sensor.memory_use_percent') | float < 75 }}"
      - action: script.global_notify
        data:
          notify_service_override: "input_text.notify_service_server"
          message: "🟢 RAM = {{ states('sensor.memory_use_percent') }}%"
    mode: single
    max_exceeded: silent

    # Notify when storage is almost full
  - id: "disk_usage"
    alias: "𐃏 Disk Usage"
    description: ""
    triggers:
      - trigger: numeric_state
        entity_id: sensor.disk_use_percent
        above: 70
    condition:
      - condition: state
        entity_id: input_boolean.maintenance_mode
        state: "off"
    actions:
      - action: script.global_notify
        data:
          notify_service_override: "input_text.notify_service_server"
          message: "🟡 Disk = {{ states('sensor.disk_use_percent') }}%"
      - wait_template: "{{ states('sensor.disk_use_percent') | float < 60 }}"
      - action: script.global_notify
        data:
          notify_service_override: "input_text.notify_service_server"
          message: "🟢 Disk = {{ states('sensor.disk_use_percent') }}%"
    mode: restart

  # Maintenance Toggle Controller
  - id: maintenance_on_off
    alias: "𐃏 Maintenance ON/OFF"
    description: ""
    triggers:
      - trigger: state
        entity_id:
          - sensor.updates_in_progress
    condition:
      - condition: template
        value_template: "{{ states.sensor.updates_in_progress.state is defined }}"
    action:
      - choose:
          - conditions:
              - condition: numeric_state
                entity_id: sensor.updates_in_progress
                below: 1
            sequence:
              - action: input_boolean.turn_off
                data: {}
                target:
                  entity_id: input_boolean.maintenance_mode
          - conditions:
              - condition: numeric_state
                entity_id: sensor.updates_in_progress
                above: 2
            sequence:
              - action: input_boolean.turn_on
                data: {}
                target:
                  entity_id: input_boolean.maintenance_mode
    mode: single

  # Maintenance Alerts
  - id: maintenance_notifications
    alias: "𐃏 Maintenance Notifications"
    description: ""
    mode: single
    triggers:
      - trigger: state
        entity_id:
          - input_boolean.maintenance_mode
    condition: []
    actions:
      - choose:
          - conditions:
              - condition: state
                entity_id: input_boolean.maintenance_mode
                state: "on"
            sequence:
              - if:
                  - condition: template
                    value_template: "{{ states.sensor.updates_in_progress.state is defined }}"
                then:
                  - wait_template: >-
                      {{ as_timestamp(states.sensor.updates_in_progress.last_updated) | int + 10 < as_timestamp(now()) | int }}
                    continue_on_timeout: true
                    timeout: "00:01:00"
              - action: script.global_notify
                data:
                  notify_service_override: "input_text.notify_service_maintenance"
                  message: |
                    ⚙️ Mentenanță în curs!
                    {% if states.sensor.updates_in_progress.state is defined and states.sensor.updates_in_progress.state | int > 0 %}
                    🔧 Următoarele actualizări vor fi instalate:
                    – {{ state_attr('sensor.updates_in_progress','names').split(',') | join('\n–') }}
                    {% endif %}
                    Vă informăm că mentenanța ar putea afecta funcționarea automatizărilor, aplicației și dispozitivelor. Ne cerem scuze pentru orice neplăceri pe care acestea le-ar putea cauza.

                    ✉️ Vă vom anunța imediat ce mentenanța va fi finalizată și când toate serviciile noastre vor fi din nou disponibile.
          - conditions:
              - condition: state
                entity_id: input_boolean.maintenance_mode
                state: "off"
            sequence:
              - action: script.global_notify
                data:
                  notify_service_override: "input_text.notify_service_maintenance"
                  message: |
                    🎉 Mentenanță finalizată!

                    Mentenanța a fost finalizată cu succes. Toate serviciile și dispozitivele sunt acum disponibile. Anunță-ne dacă întâmpini probleme sau observi anomalii de funcționare.

                    🙏 Mulțumim pentru răbdare și pentru alegerea serviciilor noastre.
