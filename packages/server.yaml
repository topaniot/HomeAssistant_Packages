# ==================================================================================
# Package: Server Monitor
# Version: 2026.06.1
# Description:
#   Monitors server health, handles updates, and manages maintenance modes.
#
# --- Required Helpers ---
# 1. input_boolean.maintenance_mode
#    - Name: "𐃏 Maintenance Mode"
#    - Purpose: Toggle to disable automations during maintenance.
#
# 2. input_text.notify_service_server (Optional)
#    - Name: "𐃏 Notify Service Server"
#    - Purpose: Specific notification service for server alerts.
#
# 3. input_text.notify_service (General/Global)
#    - Name: "𐃏 Notify Service"
#    - Purpose: Default notification service.
#
# 4. input_text.telegram_chat_id (Optional)
#    - Name: "𐃏 Telegram Chat ID"
#    - Purpose: Required only if using Telegram.
# ==================================================================================

script:
  update_packages:
    alias: "𐃏 Update Packages"
    sequence:
      - action: downloader.download_file
        data:
          overwrite: true
          url: >-
            {% set url = 'https://raw.githubusercontent.com/' %}
            {% if states.input_text.packages_account.state is defined %}
              {% set account = states('input_text.packages_account') %}
            {% else %}
              {% set account = 'topaniot' %}
            {% endif %}
            {% set path = '/HomeAssistant_Packages/main/packages/' %}
            {% set name = 'server.yaml' %}
            {{ url + account + path + name }}

input_boolean:
  maintenance_mode:
    name: "𐃏 Maintenance Mode"
    icon: "hass:wrench-clock"

http:
  use_x_forwarded_for: true
  trusted_proxies:
    - 172.30.33.0/24

system_log:
  fire_event: true

recorder:
  exclude:
    entities:
      - automation.healthchecks

rest_command:
  healthchecks:
    url: !secret healthchecks

logbook:
  exclude:
    entity_globs:
      - sensor.*_load_*
      - sensor.load_*

automation:
  # Update Packages on server STOP
  - id: 'update_on_server_stop'
    alias: "𐃏 Update Packages on STOP"
    triggers:
      - trigger: homeassistant
        event: shutdown
      - trigger: webhook
        allowed_methods: [PUT]
        local_only: false
        webhook_id: !secret update_packages_webhook
    actions:
      - action: script.turn_on
        target:
          entity_id: script.update_packages
      - delay:
          seconds: 10
    mode: single

  # Server Start/Stop Notifications
  - id: 'server_start'
    alias: "𐃏 Server Start"
    triggers:
      - trigger: homeassistant
        event: start
    condition:
      - condition: state
        entity_id: input_boolean.maintenance_mode
        state: "off"
    actions:
      - variables: &notify_vars
          notify_service: >-
            {% if states.input_text.notify_service_server.state is defined %}
              {{ states('input_text.notify_service_server') }}
            {% elif states.input_text.notify_service.state is defined %}
              {{ states('input_text.notify_service') }}
            {% else %}
              notify.notify
            {% endif %}
      - choose:
          - conditions: &telegram_cond
              - condition: template
                value_template: >-
                  {{ notify_service == 'telegram_bot.send_message' and states.input_text.telegram_chat_id is defined }}
            sequence:
              - action: "{{ notify_service }}"
                data:
                  entity_id: "{{ states('input_text.telegram_chat_id') }}"
                  message: "▶️ Serverul a pornit!"
        default:
          - action: "{{ notify_service }}"
            data:
              message: "▶️ Serverul a pornit!"
    mode: single

  - id: 'server_stop'
    alias: "𐃏 Server Stop"
    triggers:
      - trigger: homeassistant
        event: shutdown
    condition:
      - condition: state
        entity_id: input_boolean.maintenance_mode
        state: "off"
    actions:
      - variables: *notify_vars
      - choose:
          - conditions: *telegram_cond
            sequence:
              - action: "{{ notify_service }}"
                data:
                  entity_id: "{{ states('input_text.telegram_chat_id') }}"
                  message: "⏹️ Serverul s-a oprit!"
        default:
          - action: "{{ notify_service }}"
            data:
              message: "⏹️ Serverul s-a oprit!"
    mode: single

  # Healthchecks & System Tools
  - id: 'healthchecks_update'
    alias: "𐃏 HealthChecks"
    triggers:
      - trigger: time_pattern
        minutes: /1
    actions:
      - action: rest_command.healthchecks
    mode: restart

  - id: failed_notification
    alias: '𐃏 Failed Notification'
    triggers:
      - trigger: event
        event_type: system_log_event
        event_data:
          level: ERROR
    condition:
      - condition: template
        value_template: '{{ "Error sending message" in trigger.event.data.message[0] }}'
    actions:
      - action: persistent_notification.create
        data:
          message: "A apărut o problemă la trimiterea unei notificări. Anunță echipa tehnică! \n\n{{ trigger.event.data.message }}"
          title: Nu s-a putut trimite notificarea!
          notification_id: failed_notification

  - id: 'update_packages_reload'
    alias: "𐃏 Update Packages Reload"
    triggers:
      - trigger: state
        entity_id: script.update_packages
        from: 'on'
        to: 'off'
    actions:
      - delay:
          seconds: 10
      - action: homeassistant.reload_all
    mode: restart

  # Resource Monitoring (Load, RAM, Disk)
  - id: 'cpu_load_15m'
    alias: "𐃏 CPU Load"
    triggers:
      - trigger: numeric_state
        entity_id: sensor.load_15m
        above: 10
    condition:
      - condition: state
        entity_id: input_boolean.maintenance_mode
        state: "off"
    actions:
      - variables: *notify_vars
      - choose:
          - conditions: *telegram_cond
            sequence:
              - action: "{{ notify_service }}"
                data:
                  entity_id: "{{ states('input_text.telegram_chat_id') }}"
                  message: "🟡 CPU Load (15m) = {{ states('sensor.load_15m') }}"
        default:
          - action: "{{ notify_service }}"
            data:
              message: "🟡 CPU Load (15m) = {{ states('sensor.load_15m') }}"
      - wait_template: "{{ states('sensor.load_15m') | float < 4 }}"
      - choose:
          - conditions: *telegram_cond
            sequence:
              - action: "{{ notify_service }}"
                data:
                  entity_id: "{{ states('input_text.telegram_chat_id') }}"
                  message: "🟢 CPU Load (15m) = {{ states('sensor.load_15m') }}"
        default:
          - action: "{{ notify_service }}"
            data:
              message: "🟢 CPU Load (15m) = {{ states('sensor.load_15m') }}"
    mode: single

  - id: 'ram_usage'
    alias: "𐃏 RAM Usage"
    triggers:
      - trigger: numeric_state
        entity_id: sensor.memory_use_percent
        above: 90
    condition:
      - condition: state
        entity_id: input_boolean.maintenance_mode
        state: "off"
    actions:
      - variables: *notify_vars
      - choose:
          - conditions: *telegram_cond
            sequence:
              - action: "{{ notify_service }}"
                data:
                  entity_id: "{{ states('input_text.telegram_chat_id') }}"
                  message: "🟡 RAM = {{ states('sensor.memory_use_percent') }}%"
        default:
          - action: "{{ notify_service }}"
            data:
              message: "🟡 RAM = {{ states('sensor.memory_use_percent') }}%"
      - wait_template: "{{ states('sensor.memory_use_percent') | float < 80 }}"
      - choose:
          - conditions: *telegram_cond
            sequence:
              - action: "{{ notify_service }}"
                data:
                  entity_id: "{{ states('input_text.telegram_chat_id') }}"
                  message: "🟢 RAM = {{ states('sensor.memory_use_percent') }}%"
        default:
          - action: "{{ notify_service }}"
            data:
              message: "🟢 RAM = {{ states('sensor.memory_use_percent') }}%"
    mode: single

  - id: 'disk_usage'
    alias: "𐃏 Disk Usage"
    triggers:
      - trigger: numeric_state
        entity_id: sensor.disk_use_percent
        above: 70
    condition:
      - condition: state
        entity_id: input_boolean.maintenance_mode
        state: "off"
    actions:
      - variables: *notify_vars
      - choose:
          - conditions: *telegram_cond
            sequence:
              - action: "{{ notify_service }}"
                data:
                  entity_id: "{{ states('input_text.telegram_chat_id') }}"
                  message: "🟡 Disk = {{ states('sensor.disk_use_percent') }}%"
        default:
          - action: "{{ notify_service }}"
            data:
              message: "🟡 Disk = {{ states('sensor.disk_use_percent') }}%"
      - wait_template: "{{ states('sensor.disk_use_percent') | float < 60 }}"
      - choose:
          - conditions: *telegram_cond
            sequence:
              - action: "{{ notify_service }}"
                data:
                  entity_id: "{{ states('input_text.telegram_chat_id') }}"
                  message: "🟢 Disk = {{ states('sensor.disk_use_percent') }}%"
        default:
          - action: "{{ notify_service }}"
            data:
              message: "🟢 Disk = {{ states('sensor.disk_use_percent') }}%"
    mode: restart

  # Maintenance Management
  - id: maintenance_on_off
    alias: "𐃏 Maintenance ON/OFF"
    triggers:
      - trigger: state
        entity_id: sensor.updates_in_progress
    condition:
      - condition: template
        value_template: "{{ states.sensor.updates_in_progress.state is defined }}"
    actions:
      - choose:
          - conditions:
              - condition: numeric_state
                entity_id: sensor.updates_in_progress
                below: 1
            sequence:
              - action: input_boolean.turn_off
                target: { entity_id: input_boolean.maintenance_mode }
          - conditions:
              - condition: numeric_state
                entity_id: sensor.updates_in_progress
                above: 2
            sequence:
              - action: input_boolean.turn_on
                target: { entity_id: input_boolean.maintenance_mode }
    mode: single

  - id: maintenance_notifications
    alias: "𐃏 Maintenance Notifications"
    triggers:
      - trigger: state
        entity_id: input_boolean.maintenance_mode
    actions:
      - variables: *notify_vars
      - choose:
          - conditions:
              - condition: state
                entity_id: input_boolean.maintenance_mode
                state: "on"
            sequence:
              - if:
                  - condition: template
                    value_template: "{{ states.sensor.updates_in_progress.state is defined }}"
                then:
                  - wait_template: >-
                      {{ as_timestamp(states.sensor.updates_in_progress.last_updated) | int + 10 < as_timestamp(now()) | int }}
                    continue_on_timeout: true
                    timeout: "00:01:00"
              - choose:
                  - conditions: *telegram_cond
                    sequence:
                      - action: "{{ notify_service }}"
                        data:
                          entity_id: "{{ states('input_text.telegram_chat_id') }}"
                          message: |
                            ⚙️ Mentenanță în curs!
                            {% if states.sensor.updates_in_progress.state is defined and states.sensor.updates_in_progress.state | int > 0 %}
                            🔧 Următoarele actualizări vor fi instalate:
                            – {{ state_attr('sensor.updates_in_progress','names').split(',') | join('\n– ') }}
                            {% endif %}
                            Vă informăm că mentenanța ar putea afecta funcționarea automatizărilor și dispozitivelor.
                default:
                  - action: "{{ notify_service }}"
                    data:
                      message: |
                        ⚙️ Mentenanță în curs!
                        {% if states.sensor.updates_in_progress.state is defined and states.sensor.updates_in_progress.state | int > 0 %}
                        🔧 Următoarele actualizări vor fi instalate:
                        – {{ state_attr('sensor.updates_in_progress','names').split(',') | join('\n– ') }}
                        {% endif %}
                        Vă informăm că mentenanța ar putea afecta funcționarea automatizărilor și dispozitivelor.
          - conditions:
              - condition: state
                entity_id: input_boolean.maintenance_mode
                state: "off"
            sequence:
              - choose:
                  - conditions: *telegram_cond
                    sequence:
                      - action: "{{ notify_service }}"
                        data:
                          entity_id: "{{ states('input_text.telegram_chat_id') }}"
                          message: "🎉 Mentenanță finalizată! Toate serviciile sunt acum disponibile."
                default:
                  - action: "{{ notify_service }}"
                    data:
                      message: "🎉 Mentenanță finalizată! Toate serviciile sunt acum disponibile."
    mode: single
