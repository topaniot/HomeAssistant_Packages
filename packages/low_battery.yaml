# ==================================================================================
# Package: Low Batteries Monitor
# Version: 2026.06.5
# Description:
#   Monitors battery levels for sensors and triggers notifications when 
#   they drop below a defined threshold.
#   Routes all alerts through the centralized global notification engine.
#
# --- Required Helpers & Dependencies ---
# To customize this package, create the following helpers:
#
# 1. input_number.delay_notify_batteries
#    - Name: "𐃏 Delay Notifiy Batteries"
#    - Purpose: Delay (in minutes) before notification triggers.
#
# 2. input_number.battery_level_threshold
#    - Name: "𐃏 Battery Level Threshold"
#    - Purpose: Percentage threshold (default 20).
#
# 3. script.global_notify
#    - Purpose: Centralized notification engine (Defined in Server Monitor package).
#
# --- Configuration ---
# - Entity Exclusion: Assign the label "ignore" to any entity you wish to exclude.
# ==================================================================================

script:
  # Script to update this package from GitHub
  update_packages:
    sequence:
      - action: downloader.download_file
        data:
          overwrite: true
          url: >-
            {% set url = 'https://raw.githubusercontent.com/' %}
            {% if states.input_text.packages_account.state is defined %}
              {% set account = states('input_text.packages_account') %}
            {% else %}
              {% set account = 'topaniot' %}
            {% endif %}
            {% set path = '/HomeAssistant_Packages/main/packages/' %}
            {% set name = 'low_battery.yaml' %}
            {{ url + account + path + name }}

template:
  - trigger:
      - trigger: time_pattern
        seconds: "/1"
    sensor:
      - name: "𐃏 Low Batteries"
        icon: "hass:battery-alert-variant-outline"
        state: >
              {% set mobile_entities = integration_entities('mobile_app') %}
              {% set ignored = label_entities('ignore') + mobile_entities %}
                    
              {% if states.input_number.battery_level_threshold.state is defined %}
                {% set threshold = states('input_number.battery_level_threshold') | int %}
              {% else %}
                {% set threshold = 20 %}
              {% endif %}
              
              {% set result = namespace(sensors=[]) %}
              {% for state in states.sensor 
                |selectattr('attributes.device_class', 'defined')
                |selectattr('attributes.device_class', '==', 'battery')
                |rejectattr('entity_id','in', ignored) 
              %}
              {% if 0 <= state.state | int (-1) < threshold | int  %}
                {% set result.sensors = result.sensors + [state.name ~ ' (' ~ state.state ~ '%)'] %}
              {% endif %}
              {% endfor %}
              {{ result.sensors|count }}
        attributes:
            names: >
              {% set mobile_entities = integration_entities('mobile_app') %}
              {% set ignored = label_entities('ignore') + mobile_entities %}

              {% if states.input_number.battery_level_threshold.state is defined %}
                {% set threshold = states('input_number.battery_level_threshold') | int %}
              {% else %}
                {% set threshold = 20 %}
              {% endif %}
              {% set result = namespace(sensors=[]) %}
              {% for state in states.sensor 
                |selectattr('attributes.device_class', 'defined')
                |selectattr('attributes.device_class', '==', 'battery')
                |rejectattr('entity_id','in', ignored) 
              %}
                {% if 0 <= state.state | int(-1) < threshold %}
                  {% set dev_name = device_attr(state.entity_id, 'name') %}
                  {% set is_generic = dev_name and ('shelly' in dev_name|lower or 'bthome' in dev_name|lower or 'daikin' in dev_name|lower or 'system monitor' in dev_name|lower) %}
                  {# Combine device and entity name raw strings #}
                  {% if dev_name and not is_generic %}
                    {% set raw_combined = dev_name ~ ' ' ~ state.name %}
                  {% else %}
                    {% set raw_combined = state.name %}
                  {% endif %}
                  {# Tokenize, deduplicate, and strip battery keywords #}
                  {% set words = raw_combined.split(' ') %}
                  {% set w_ns = namespace(seen=[], unique=[]) %}
                  {% for w in words %}
                    {% set norm = w | lower | replace(':','') | replace('-','') | replace(',','') | replace('(','') | replace(')','') | trim %}
                    {% if norm != '' and norm not in w_ns.seen and norm not in ['battery', 'baterie', 'level'] %}
                      {% set w_ns.seen = w_ns.seen + [norm] %}
                      {% set w_ns.unique = w_ns.unique + [w] %}
                    {% endif %}
                  {% endfor %}
                  {% set display_name = w_ns.unique | join(' ') | trim %}
                  {# Fallback in case the name consisted ONLY of the keyword #}
                  {% if display_name == '' %}
                    {% set display_name = state.name %}
                  {% endif %}
                  {% set result.sensors = result.sensors + [display_name ~ ' (' ~ state.state ~ '%)'] %}
                {% endif %}
              {% endfor %}
              {{ result.sensors | join(', ') }}
      - name: "𐃏 Low Batteries Offset"
        icon: "hass:battery-heart-variant"
        state: >
              {% set ignored = label_entities('ignore') %}
                    
              {% if states.input_number.battery_level_threshold.state is defined %}
                {% set threshold = states('input_number.battery_level_threshold') | int + 10 %}
              {% else %}
                {% set threshold = 30 %}
              {% endif %}
              
              {% set result = namespace(sensors=[]) %}
              {% for state in states.sensor 
                |selectattr('attributes.device_class', 'defined')
                |selectattr('attributes.device_class', '==', 'battery')
                |rejectattr('entity_id','in', ignored) 
              %}
              {% if state.state | int (-1) < threshold | int  %}
                {% set result.sensors = result.sensors + [state.name ~ ' (' ~ state.state ~ '%)'] %}
              {% endif %}
              {% endfor %}
              {{ result.sensors|count }}
    binary_sensor:
      - name: "𐃏 Low Batteries Alert"
        state: "{{ states('sensor.low_batteries') | int > 0 }}"

input_number:
  low_batteries_last_triggered:
    name: "𐃏 Low Batteries Last Triggered"
    icon: "hass:alert-circle"
    mode: box
    min: 0
    max: 99999
    step: 1

automation:
  - id: "low_batteries"
    alias: "𐃏 Low Batteries"
    mode: restart
    triggers:
      - trigger: state
        entity_id: sensor.low_batteries
      - trigger: state
        entity_id: sensor.low_batteries_offset
      - trigger: homeassistant
        event: start
    condition:
      - condition: template
        value_template: "{{ states.sensor.low_batteries.state is defined }}"
    actions:
      - variables:
          count: "{{ states('sensor.low_batteries') | int(0) }}"
          offset_count: "{{ states('sensor.low_batteries_offset') | int(0) }}"
          last_triggered: "{{ states('input_number.low_batteries_last_triggered') | int(0) }}"
      - condition: template
        value_template: >-
          {{ count != last_triggered or (count == 0 and offset_count == 0 and last_triggered > 0) }}
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ count > 0 }}"
            sequence:
              - delay: 
                  minutes: >-
                    {% if states.input_number.delay_notify_batteries.state is defined %}
                      {{ states('input_number.delay_notify_batteries') | int }}
                    {% else %}
                      10
                    {% endif %}
      - action: script.global_notify
        data:
          notify_service_override: "input_text.notify_service_battery"
          message: |
            {% if count == 0 %}
            🔋 Starea bateriilor este bună!
            {% elif count == 1 %}
            ⚠️ Este un dispozitiv cu baterie descărcată:
            – {{ state_attr('sensor.low_batteries','names').split(',') | map('trim') | join('\n– ') }}
            {% else %}
            ⚠️ Sunt {{ count }} dispozitive cu baterii descărcate:
            – {{ state_attr('sensor.low_batteries','names').split(',') | map('trim') | join('\n– ') }}
            {% endif %}
      - action: input_number.set_value
        target:
          entity_id: input_number.low_batteries_last_triggered
        data:
          value: "{{ count }}"
