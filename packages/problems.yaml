# ==================================================================================
# Package: Problems Detected Monitor
# Version: 2026.06.1
# Description:
#   Monitors binary_sensors with device_class 'problem' and notifies when issues arise.
#
# --- Required Helpers ---
# To customize this package, create the following helpers:
#
# 1. input_number.delay_notify_problems
#    - Name: "𐃏 Delay Notifiy Problems"
#    - Purpose: Delay (in minutes) before notification triggers.
#
# 2. input_text.notify_service_problems (Optional)
#    - Name: "𐃏 Notify Service Problems"
#    - Purpose: Specific notification service for this package.
#
# 3. input_text.notify_service (General/Global)
#    - Name: "𐃏 Notify Service"
#    - Purpose: Default notification service used by this and other packages.
#
# 4. input_text.telegram_chat_id (Optional)
#    - Name: "𐃏 Telegram Chat ID"
#    - Purpose: Required only if using Telegram.
#
# --- Configuration ---
# - Entity Exclusion: Assign the label "ignore" to any entity you wish to exclude.
# ==================================================================================

script:
  update_packages:
    sequence:
      - action: downloader.download_file
        data:
          overwrite: true
          url: >-
            {% set url = 'https://raw.githubusercontent.com/' %}
            {% if states.input_text.packages_account.state is defined %}
              {% set account = states('input_text.packages_account') %}
            {% else %}
              {% set account = 'topaniot' %}
            {% endif %}
            {% set path = '/HomeAssistant_Packages/main/packages/' %}
            {% set name = 'problems.yaml' %}
            {{ url + account + path + name }}

template:
  - trigger:
      - trigger: time_pattern
        seconds: "/1"
    sensor:
      - name: "𐃏 Problems Detected"
        icon: "hass:alert-outline"
        state: >
          {% set ignored = label_entities('ignore') %}
          {{ states.binary_sensor
            |selectattr('attributes.device_class','defined')
            |selectattr('attributes.device_class','eq','problem')
            |rejectattr('state', 'in', ['off','unknown','unavailable','none'])
            |rejectattr('entity_id','in', ignored )
            |list|count 
          }}
        attributes:
          names: >
            {% set ignored = label_entities('ignore') %}
            {{ states.binary_sensor
              |selectattr('attributes.device_class','defined')
              |selectattr('attributes.device_class','eq','problem')
              |rejectattr('state', 'in', ['off','unknown','unavailable','none'])
              |rejectattr('entity_id','in', ignored )
              |map(attribute='name')|join(', ')
            }}

input_number:
  problems_detected_last_triggered:
    name: "𐃏 Problems Detected Last Triggered"
    icon: "hass:alert-circle"
    mode: box
    min: 0
    max: 99999
    step: 1

automation:
  - id: "problems_detected"
    alias: "𐃏 Problems Detected"
    mode: restart
    triggers:
      - trigger: state
        entity_id: sensor.problems_detected
      - trigger: homeassistant
        event: start
      - trigger: state
        entity_id: input_boolean.maintenance_mode
        to: "off"
    condition:
      - condition: state
        entity_id: input_boolean.maintenance_mode
        state: "off"
      - condition: template
        value_template: "{{ states.sensor.problems_detected.state is defined }}"
    actions:
      - variables:
          count: "{{ states('sensor.problems_detected') | int(0) }}"
          last_triggered: "{{ states('input_number.problems_detected_last_triggered') | int(0) }}"
          notify_service: >-
            {% set server = states('input_text.notify_service_server') %}
            {% set general = states('input_text.notify_service') %}
            {% if server not in ['unknown', 'unavailable', ''] %}
              {{ server }}
            {% elif general not in ['unknown', 'unavailable', ''] %}
              {{ general }}
            {% else %}
              notify.notify
            {% endif %}
          notify_message: |
            {% if count == 0 %}
            👌 Probleme rezolvate!
            {% elif count == 1 %}
            ⚠️ Este o problemă:
            – {{ state_attr('sensor.problems_detected','names').split(',') | map('trim') | join('\n–') }}
            {% else %}
            ⚠️ Sunt {{ count }} probleme:
            – {{ state_attr('sensor.problems_detected','names').split(',') | map('trim') | join('\n–') }}
            {% endif %}
      - condition: template
        value_template: "{{ count != last_triggered }}"
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ count > 0 }}"
            sequence:
              - delay: 
                  minutes: >-
                    {% if states.input_number.delay_notify_problems.state is defined %}
                      {{ states('input_number.delay_notify_problems') | int }}
                    {% else %}
                      10
                    {% endif %}
      - choose:
          - conditions:
              - condition: template
                value_template: >-
                  {{ notify_service == 'telegram_bot.send_message' and states('input_text.telegram_chat_id') not in ['unknown', 'unavailable', ''] }}
            sequence:
              - action: "{{ notify_service }}"
                data:
                  entity_id: "{{ states('input_text.telegram_chat_id') }}"
                  message: "{{ notify_message }}"
        default:
          - action: "{{ notify_service }}"
            data:
              message: "{{ notify_message }}"
      - action: input_number.set_value
        target:
          entity_id: input_number.problems_detected_last_triggered
        data:
          value: "{{ count }}"
